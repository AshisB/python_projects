<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>My Blog</title>
</head>
<body>
    <h1>My Blog</h1>
    {% for blog in blog_data: %}
        {% if blog['id']==2: %}
            <h2>{{blog['title']}}</h2>
            <strong>{{blog['subtitle']}}</strong>
        {% endif %}
    {% endfor %}
</body>
</html>
